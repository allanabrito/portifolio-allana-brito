<!DOCTYPE html>
<html>
<head>

 <meta charset="UTF-8">
<title>Receita de Nhoque</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="receita">

<h1>Nhoque Caseiro</h1>

<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d" width="300">

<h2>Ingredientes</h2>

<ul>
<li>1 kg de batata</li>
<li>1 ovo</li>
<li>1 xícara de farinha</li>
<li>Sal a gosto</li>
</ul>

<h2>Modo de preparo</h2>

<ol>
<li>Cozinhe as batatas.</li>
<li>Amasse até formar um purê.</li>
<li>Adicione o ovo e a farinha.</li>
<li>Faça rolinhos e corte o nhoque.</li>
<li>Cozinhe em água fervente até subir.</li>

</ol>

</div>

</body>
</html>
